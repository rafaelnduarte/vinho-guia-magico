name: Deploy to App Store

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --force

      - name: Build app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Fastlane
        run: |
          gem install bundler
          bundle install

      - name: Setup certificates and provisioning profiles
        run: |
          bundle exec fastlane match appstore --readonly --team_id CRZS87SK92
          bundle exec fastlane match development --readonly --team_id CRZS87SK92

      - name: Build iOS app
        run: |
          cd ios/App
          bundle exec fastlane build_app scheme: "App" export_method: "app-store" team_id: "CRZS87SK92" bundle_id: "com.radarjovemdovinho"

      - name: Upload to TestFlight
        run: |
          bundle exec fastlane upload_to_testflight api_key_path: ./fastlane/api_key.json team_id: "CRZS87SK92"

      - name: Cleanup
        run: |
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
          rm -rf ~/Library/Keychains/login.keychain-db

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
      APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
      APPSTORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
